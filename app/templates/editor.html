{% extends "base.html" %}

{% block content %}
<div class="editor">
    <form method="POST">
        <div class="form-group">
            <label for="title">Заголовок</label>
            <input type="text" id="title" name="title" placeholder="Title" value="{{ page.title if page }}">
        </div>
        <div class="form-group">
            <label for="slug">URL-адрес (slug)</label>
            <input type="text" id="slug" name="slug" placeholder="slug" value="{{ page.slug if page }}">
        </div>
        <div class="form-group">
            <label for="content">Содержимое</label>
            <div class="editor-container">
                <textarea id="markdown-editor" name="content">{{ page.content if page }}</textarea>
                <div id="markdown-preview" class="preview"></div>
            </div>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_category" {% if page and page.is_category %}checked{% endif %}>
                Это раздел (категория)
            </label>
        </div>
        <div class="editor-toolbar">
            <button type="button" onclick="insertText('**', '**')"><strong>B</strong></button>
            <button type="button" onclick="insertText('*', '*')"><em>I</em></button>
            <button type="button" onclick="insertText('[', '](url)')">Link</button>
            <button type="button" onclick="insertText('![', '](image-url)')">Image</button>
            <label for="file-upload" class="button">Upload Image</label>
            <input id="file-upload" type="file" style="display:none" onchange="uploadImage(this)">
        </div>
        <button type="submit" class="btn">Сохранить</button>
    </form>
</div>
{% endblock %}
